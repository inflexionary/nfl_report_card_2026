<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFLPA 2026 Report Cards — Heat Map</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --accent: #f0b429;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

  body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  /* non-scrolling top chrome */
  #chrome { flex-shrink: 0; }

  header {
    padding: 20px 32px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(22px, 3vw, 44px);
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }
  header p { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; letter-spacing: 1px; text-transform: uppercase; margin-top: 3px; }

  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .sort-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  select { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px; padding: 6px 12px; border-radius: 4px; cursor: pointer; outline: none; }
  select:hover { border-color: var(--accent); }

  .legend {
    display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
    padding: 7px 32px; border-bottom: 1px solid var(--border);
  }
  .legend-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-right: 6px; }
  .legend-item { display: flex; align-items: center; gap: 3px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
  .legend-swatch { width: 18px; height: 12px; border-radius: 2px; }
  .legend-hint { margin-left: 12px; font-family: 'DM Mono', monospace; font-size: 10px; color: #444; }

  /* THE KEY FIX: scroll container takes remaining height, thead sticks at top:0 of this element */
  #scroll-area {
    flex: 1;
    overflow: auto;
    padding: 0 32px 32px;
  }

  table { border-collapse: collapse; table-layout: fixed; }

  thead th {
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    padding: 6px 4px;
    text-align: center;
    vertical-align: bottom;
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
  }
  thead th:hover { color: var(--accent); }

  /* team column header: sticky left AND top */
  thead th.team-header {
    text-align: left;
    position: sticky;
    left: 0;
    z-index: 20;
    padding-left: 0;
    min-width: 185px;
  }

  .col-header-inner {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    height: 108px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding: 4px 0;
  }

  tbody tr:hover td.team-cell { color: var(--accent) !important; background: var(--bg) !important; }
  tbody tr:hover td.rank-cell { opacity: 0.7; }
  tbody tr { border-left: 3px solid transparent; }
  tbody tr:hover { border-left: 3px solid rgba(240,180,41,0.5); }

  td { padding: 3px; text-align: center; border: 1px solid rgba(255,255,255,0.04); }

  td.team-cell {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--text);
    text-align: left;
    padding: 4px 14px 4px 0;
    white-space: nowrap;
    position: sticky;
    left: 0;
    background: var(--bg);
    z-index: 5;
    border-right: 1px solid var(--border);
  }

  .rank-cell {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    width: 36px;
    min-width: 36px;
  }

  .grade-cell {
    width: 42px;
    min-width: 42px;
    height: 30px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    border-radius: 3px;
    cursor: default;
    transition: transform 0.1s, box-shadow 0.1s;
    position: relative;
  }
  .grade-cell:hover {
    transform: scale(1.28);
    z-index: 50;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    outline: 2px solid rgba(255,255,255,0.8);
    outline-offset: 1px;
  }

  /* tooltip */
  #tooltip {
    display: none;
    position: fixed;
    background: #16162a;
    border: 1px solid #2a2a40;
    border-radius: 7px;
    padding: 10px 14px;
    font-family: 'DM Mono', monospace;
    pointer-events: none;
    z-index: 9999;
    max-width: 290px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7);
  }
  #tooltip .tip-title  { color: var(--accent); font-size: 12px; font-weight: 500; margin-bottom: 2px; }
  #tooltip .tip-sub    { color: var(--muted); font-size: 10px; margin-bottom: 2px; }
  #tooltip .tip-grade  { font-size: 22px; font-weight: 500; margin: 4px 0 2px; }
  #tooltip .tip-desc   { color: #aaa; font-size: 10px; line-height: 1.5; margin-top: 4px; white-space: normal; }
  #tooltip .tip-divider { border: none; border-top: 1px solid #2a2a40; margin: 8px 0; }
  #tooltip .tip-comment { color: #c8c8e0; font-size: 10px; line-height: 1.6; white-space: normal; font-style: italic; }
  #tooltip .tip-source  { color: #484860; font-size: 9px; margin-top: 4px; }
</style>
</head>

    <span class="legend-hint">· Hover columns or cells for details · Click column to sort</span>
  </div>
</div>

<div id="scroll-area">
  <table id="heatTable">
    <thead><tr id="headerRow"></tr></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

function gv(g) { const i = GRADE_ORDER.indexOf(g); return i === -1 ? 99 : i; }

let sortKey = 'overall';
let sortAsc = true;

function renderTable(rows) {
  const hr = document.getElementById('headerRow');
  const tb = document.getElementById('tableBody');

  hr.innerHTML = `
    <th class="team-header">
      <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;">TEAM</span>
    </th>
    <th style="width:36px;cursor:pointer;color:var(--accent);font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;"
        data-cat="overall"
        onclick="colSort('overall')"
        onmouseleave="hideTip()">RNK</th>
    ${CATS.map(c => `
      <th onclick="colSort('${c}')" data-cat="${c}" onmouseleave="hideTip()">
        <div class="col-header-inner">${SHORT[c]}</div>
      </th>`).join('')}`;

  tb.innerHTML = rows.map(t => {
    const rc = t.o <= 5 ? '#00c853' : t.o >= 28 ? '#e83f10' : 'var(--muted)';
    const cells = CATS.map(c => {
      const gr = t.g[c] || '—';
      const bg = GC[gr] || '#1a1a2e';
      const tx = GT[gr] || '#fff';
      return `<td class="grade-cell" style="background:${bg};color:${tx};"
        data-t="${t.n}" data-c="${c}" data-g="${gr}"
        onmouseenter="cellTip(event,this)" onmouseleave="hideTip()">${gr}</td>`;
    }).join('');
    return `<tr>
      <td class="team-cell">${t.n}</td>
      <td class="rank-cell" style="color:${rc};">${t.o}</td>
      ${cells}
    </tr>`;
  }).join('');
}

function colSort(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = true; }
  document.getElementById('sortSelect').value = key;
  doSort();
}

function doSort() {
  const s = [...TEAMS].sort((a,b) => {
    if (sortKey === 'overall') return sortAsc ? a.o - b.o : b.o - a.o;
    const av = gv(a.g[sortKey]||''), bv = gv(b.g[sortKey]||'');
    return sortAsc ? av - bv : bv - av;
  });
  renderTable(s);
  // re-attach th hover listeners
  document.querySelectorAll('#headerRow th[data-cat]').forEach(th => {
    th.addEventListener('mouseenter', e => {
      const cat = th.dataset.cat;
      const title = cat === 'overall' ? 'Overall Rank' : cat;
      const desc = cat === 'overall'
        ? 'The team\'s overall rank across all 17 categories combined. 1 = best, 32 = worst.'
        : (DESC[cat] || cat);
      colTip(e, title, desc);
    });
  });
}

document.getElementById('sortSelect').addEventListener('change', function() {
  sortKey = this.value; sortAsc = true; doSort();
});

// tooltip
const TT = document.getElementById('tooltip');
function moveTip(e) {
  const x = e.clientX + 14, y = e.clientY - 8;
  TT.style.left = Math.min(x, window.innerWidth - (TT.offsetWidth||220) - 8) + 'px';
  TT.style.top  = Math.min(y, window.innerHeight - (TT.offsetHeight||100) - 8) + 'px';
}
function cellTip(e, el) {
  const g = el.dataset.g;
  const team = el.dataset.t;
  const cat = el.dataset.c;
  document.getElementById('tipTitle').textContent = team;
  document.getElementById('tipSub').textContent = cat;
  document.getElementById('tipGrade').textContent = g;
  document.getElementById('tipGrade').style.color = GC[g] || '#fff';
  document.getElementById('tipDesc').textContent = DESC[cat] || '';

  // Show sourced comment if available
  const commentKey = team + '|' + cat;
  const comment = COMMENTS[commentKey];
  const divider = document.getElementById('tipDivider');
  const commentEl = document.getElementById('tipComment');
  const sourceEl = document.getElementById('tipSource');
  if (comment) {
    divider.style.display = 'block';
    commentEl.textContent = comment;
    sourceEl.textContent = 'Source: ESPN / Yahoo Sports';
    commentEl.style.display = 'block';
    sourceEl.style.display = 'block';
  } else {
    divider.style.display = 'none';
    commentEl.style.display = 'none';
    sourceEl.style.display = 'none';
  }

  TT.style.display = 'block'; moveTip(e);
}
function colTip(e, name, desc) {
  document.getElementById('tipTitle').textContent = name;
  document.getElementById('tipSub').textContent = 'Survey Category';
  document.getElementById('tipGrade').textContent = '';
  document.getElementById('tipDesc').textContent = desc;
  TT.style.display = 'block'; moveTip(e);
}
function hideTip() { TT.style.display = 'none'; }
document.addEventListener('mousemove', e => { if (TT.style.display==='block') moveTip(e); });

doSort();
</script>
