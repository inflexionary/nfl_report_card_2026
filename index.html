<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFLPA 2026 Report Cards — Heat Map</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f0;
    --surface: #ffffff;
    --surface2: #f0f0eb;
    --border: #ddddd8;
    --text: #1a1a24;
    --muted: #7a7a8a;
    --accent: #c47800;
    --accent-light: #fff3dc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── DESKTOP: fixed viewport layout ── */
  @media (min-width: 769px) {
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    #chrome { flex-shrink: 0; }
    #scroll-area { flex: 1; overflow: auto; padding: 0 28px 28px; }
    #mobile-note { display: none; }
  }

  /* ── MOBILE: natural scroll ── */
  @media (max-width: 768px) {
    html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
    body { display: block; }
    #scroll-area { padding: 0 12px 40px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    #desktop-table { display: none; }
    #mobile-note { display: block; }
  }

  /* ── HEADER ── */
  header {
    padding: 16px 28px 12px;
    border-bottom: 2px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(20px, 3vw, 40px);
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }
  header p { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; letter-spacing: 1px; text-transform: uppercase; margin-top: 3px; }

  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .sort-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    outline: none;
  }
  select:hover { border-color: var(--accent); }

  /* ── LEGEND ── */
  .legend {
    display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
    padding: 7px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .legend-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-right: 6px; }
  .legend-item { display: flex; align-items: center; gap: 3px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text); }
  .legend-swatch { width: 18px; height: 12px; border-radius: 2px; border: 1px solid rgba(0,0,0,0.08); }

  /* ── TABLE ── */
  table { border-collapse: collapse; table-layout: fixed; background: var(--surface); }

  thead th {
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 10;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    padding: 5px 3px;
    text-align: center;
    vertical-align: bottom;
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid var(--border);
    box-shadow: 0 1px 0 var(--border);
  }
  thead th:hover { color: var(--accent); }

  thead th.team-header {
    text-align: left;
    position: sticky;
    left: 0;
    z-index: 20;
    padding-left: 0;
    min-width: 200px;
    background: var(--surface);
  }

  .col-header-inner {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    height: 108px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding: 4px 0;
  }

  tbody tr { transition: background 0.1s; }
  tbody tr:hover { background: #fffbf0; }
  tbody tr:hover td.team-cell { color: var(--accent) !important; background: #fffbf0 !important; }
  tbody tr:hover { border-left: 3px solid var(--accent); }
  tbody tr { border-left: 3px solid transparent; }

  td {
    padding: 3px;
    text-align: center;
    border: 1px solid rgba(0,0,0,0.05);
  }

  td.team-cell {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--text);
    text-align: left;
    padding: 3px 10px 3px 0;
    white-space: nowrap;
    position: sticky;
    left: 0;
    background: var(--surface);
    z-index: 5;
    border-right: 2px solid var(--border);
    transition: background 0.1s;
  }

  .team-inner {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .team-logo {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
    object-fit: contain;
  }

  .rank-cell {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    width: 36px;
    min-width: 36px;
    background: var(--surface2);
  }

  .grade-cell {
    width: 40px;
    min-width: 40px;
    height: 29px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    border-radius: 2px;
    cursor: default;
    transition: transform 0.1s, box-shadow 0.1s;
    position: relative;
  }
  .grade-cell:hover {
    transform: scale(1.28);
    z-index: 50;
    box-shadow: 0 3px 14px rgba(0,0,0,0.25);
    outline: 2px solid rgba(0,0,0,0.35);
    outline-offset: 1px;
  }

  /* ── TOOLTIP ── */
  #tooltip {
    display: none;
    position: fixed;
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 15px;
    font-family: 'DM Mono', monospace;
    pointer-events: none;
    z-index: 9999;
    max-width: 300px;
    box-shadow: 0 6px 28px rgba(0,0,0,0.18);
  }
  #tooltip .tip-title  { color: var(--accent); font-size: 12px; font-weight: 500; margin-bottom: 2px; }
  #tooltip .tip-sub    { color: var(--muted); font-size: 10px; margin-bottom: 2px; }
  #tooltip .tip-grade  { font-size: 22px; font-weight: 500; margin: 4px 0 2px; }
  #tooltip .tip-desc   { color: #555; font-size: 10px; line-height: 1.5; margin-top: 4px; white-space: normal; }
  #tooltip .tip-divider { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
  #tooltip .tip-comment { color: #333; font-size: 10px; line-height: 1.6; white-space: normal; font-style: italic; }
  #tooltip .tip-source  { color: #aaa; font-size: 9px; margin-top: 4px; }

  /* ── MOBILE CARDS ── */
  #mobile-note {
    padding: 12px 16px;
    background: var(--accent-light);
    border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #mobile-view { padding: 12px; }

  .mobile-sort {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .team-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .team-card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .team-card-header:active { background: var(--surface2); }

  .mobile-team-logo {
    width: 36px;
    height: 36px;
    object-fit: contain;
    flex-shrink: 0;
  }

  .team-card-name {
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--text);
    flex: 1;
  }

  .team-card-rank {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    margin-right: 4px;
  }

  .card-chevron {
    font-size: 12px;
    color: var(--muted);
    transition: transform 0.25s;
  }
  .team-card.expanded .card-chevron { transform: rotate(180deg); }

  .team-card-grades {
    display: none;
    padding: 12px 14px;
    background: var(--surface2);
  }
  .team-card.expanded .team-card-grades { display: block; }

  .mobile-grade-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    font-size: 13px;
  }
  .mobile-grade-row:last-child { border-bottom: none; }
  .mobile-cat-name {
    color: var(--muted);
    font-size: 12px;
    flex: 1;
  }
  .mobile-grade-pill {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 4px;
    min-width: 40px;
    text-align: center;
  }

  /* Swipe hint */
  .swipe-hint {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    padding: 8px;
    letter-spacing: 1px;
  }
</style>
</head>

</div>

function gv(g) { const i = GRADE_ORDER.indexOf(g); return i === -1 ? 99 : i; }

// ── LOGO HELPER ───────────────────────────────────────────────────────────────
function logoImg(name, cls) {
  const src = LOGOS[name] || '';
  return src ? `<img class="${cls}" src="${src}" alt="" onerror="this.style.display='none'">` : '';
}

// ── DESKTOP TABLE ─────────────────────────────────────────────────────────────
let sortKey = 'overall', sortAsc = true;

function renderTable(rows) {
  const hr = document.getElementById('headerRow');
  const tb = document.getElementById('tableBody');
  if(!hr) return;

  hr.innerHTML = `
    <th class="team-header">
      <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;">TEAM</span>
    </th>
    <th style="width:36px;cursor:pointer;color:var(--accent);font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;"
        data-cat="overall" onclick="colSort('overall')" onmouseleave="hideTip()">RNK</th>
    ${CATS.map(c => `
      <th onclick="colSort('${c}')" data-cat="${c}" onmouseleave="hideTip()">
        <div class="col-header-inner">${SHORT[c]}</div>
      </th>`).join('')}`;

  tb.innerHTML = rows.map(t => {
    const rc = t.o <= 5 ? '#1a7a3a' : t.o >= 28 ? '#a81000' : '#6a6a7a';
    const cells = CATS.map(c => {
      const gr = t.g[c] || '—';
      const bg = GC[gr] || '#e8e8e4';
      const tx = GT[gr] || '#333';
      return `<td class="grade-cell" style="background:${bg};color:${tx};"
        data-t="${t.n}" data-c="${c}" data-g="${gr}"
        onmouseenter="cellTip(event,this)" onmouseleave="hideTip()">${gr}</td>`;
    }).join('');
    return `<tr>
      <td class="team-cell">
        <div class="team-inner">
          ${logoImg(t.n, 'team-logo')}
          ${t.n}
        </div>
      </td>
      <td class="rank-cell" style="color:${rc};">${t.o}</td>
      ${cells}
    </tr>`;
  }).join('');

  // header hover listeners
  document.querySelectorAll('#headerRow th[data-cat]').forEach(th => {
    th.addEventListener('mouseenter', e => {
      const cat = th.dataset.cat;
      const title = cat === 'overall' ? 'Overall Rank' : cat;
      const desc = cat === 'overall'
        ? 'The team\'s overall rank across all 17 categories combined. 1 = best, 32 = worst.'
        : (DESC[cat] || cat);
      colTip(e, title, desc);
    });
  });
}

function colSort(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = true; }
  document.getElementById('sortSelect').value = key;
  doSort();
}

function doSort() {
  const s = [...TEAMS].sort((a,b) => {
    if (sortKey === 'overall') return sortAsc ? a.o - b.o : b.o - a.o;
    const av = gv(a.g[sortKey]||''), bv = gv(b.g[sortKey]||'');
    return sortAsc ? av - bv : bv - av;
  });
  renderTable(s);
  renderMobile(s);
}

document.getElementById('sortSelect').addEventListener('change', function() {
  sortKey = this.value; sortAsc = true; doSort();
});

// ── TOOLTIP ────────────────────────────────────────────────────────────────────
const TT = document.getElementById('tooltip');
function moveTip(e) {
  const x = e.clientX + 14, y = e.clientY - 8;
  TT.style.left = Math.min(x, window.innerWidth - (TT.offsetWidth||240) - 8) + 'px';
  TT.style.top  = Math.min(y, window.innerHeight - (TT.offsetHeight||120) - 8) + 'px';
}
function cellTip(e, el) {
  const g = el.dataset.g, team = el.dataset.t, cat = el.dataset.c;
  document.getElementById('tipTitle').textContent = team;
  document.getElementById('tipSub').textContent = cat;
  document.getElementById('tipGrade').textContent = g;
  document.getElementById('tipGrade').style.color = GC[g] ? 'var(--text)' : '#888';
  // Show grade with a background swatch feel
  document.getElementById('tipGrade').style.background = GC[g] || 'transparent';
  document.getElementById('tipGrade').style.color = GT[g] || '#333';
  document.getElementById('tipGrade').style.padding = '2px 10px';
  document.getElementById('tipGrade').style.borderRadius = '4px';
  document.getElementById('tipGrade').style.display = 'inline-block';
  document.getElementById('tipDesc').textContent = DESC[cat] || '';
  const commentKey = team + '|' + cat;
  const comment = COMMENTS[commentKey];
  const divider = document.getElementById('tipDivider');
  const commentEl = document.getElementById('tipComment');
  const sourceEl = document.getElementById('tipSource');
  if (comment) {
    divider.style.display = 'block';
    commentEl.textContent = comment;
    sourceEl.textContent = 'Source: ESPN / Yahoo Sports';
    commentEl.style.display = 'block';
    sourceEl.style.display = 'block';
  } else {
    divider.style.display = 'none';
    commentEl.style.display = 'none';
    sourceEl.style.display = 'none';
  }
  TT.style.display = 'block'; moveTip(e);
}
function colTip(e, name, desc) {
  document.getElementById('tipTitle').textContent = name;
  document.getElementById('tipSub').textContent = 'Survey Category';
  document.getElementById('tipGrade').textContent = '';
  document.getElementById('tipGrade').style.background = 'transparent';
  document.getElementById('tipGrade').style.padding = '0';
  document.getElementById('tipDesc').textContent = desc;
  document.getElementById('tipDivider').style.display = 'none';
  document.getElementById('tipComment').style.display = 'none';
  document.getElementById('tipSource').style.display = 'none';
  TT.style.display = 'block'; moveTip(e);
}
function hideTip() { TT.style.display = 'none'; }
document.addEventListener('mousemove', e => { if (TT.style.display==='block') moveTip(e); });

// ── MOBILE CARDS ──────────────────────────────────────────────────────────────
function renderMobile(rows) {

  const dirArrow = sortAsc ? '↑ Best first' : '↓ Worst first';

  mv.innerHTML = `

        ${dirLabel}

    </div>
    <div style="padding:10px 12px 40px;">
      ${rows.map(t => {
        const rc = t.o <= 5 ? '#1a7a3a' : t.o >= 28 ? '#a81000' : '#6a6a7a';

        // Badge shown in collapsed header: sort metric grade (or rank if overall)
        let headerBadge = '';
        if (sortKey === 'overall') {
          headerBadge = `<span style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:${rc};margin-right:2px;line-height:1">${t.o}</span>`;
        } else {
          const gr = t.g[sortKey] || '—';
          const bg = GC[gr] || '#e8e8e4';
          const tx = GT[gr] || '#333';
          headerBadge = `<span style="font-family:'DM Mono',monospace;font-size:13px;font-weight:700;padding:3px 9px;border-radius:5px;background:${bg};color:${tx};line-height:1;white-space:nowrap;">${gr}</span>`;
        }

        return `<div class="team-card" id="card-${t.n.replace(/[\s']/g,'-')}">
          <div class="team-card-header" onclick="toggleCard('${t.n.replace(/[\s']/g,'-')}')">
            ${logoImg(t.n,'mobile-team-logo')}
            <span class="team-card-name">${t.n}</span>
            ${headerBadge}
            <span class="card-chevron">▼</span>
          </div>
          <div class="team-card-grades">
            ${CATS.map(c => {
              const gr = t.g[c] || '—';
              const bg = GC[gr] || '#e8e8e4';
              const tx = GT[gr] || '#333';
              const isActive = c === sortKey;
              return `<div class="mobile-grade-row" style="${isActive ? 'background:rgba(196,120,0,0.07);border-radius:4px;margin:0 -4px;padding:6px 4px;' : ''}">
                <span class="mobile-cat-name" style="${isActive ? 'color:var(--accent);font-weight:600;' : ''}">${c}</span>
                <span class="mobile-grade-pill" style="background:${bg};color:${tx};${isActive ? 'box-shadow:0 0 0 2px var(--accent);' : ''}">${gr}</span>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>`;

  document.getElementById('mobileSortSelect').addEventListener('change', function() {
    sortKey = this.value; sortAsc = true; doSort();
  });

function mobileToggleDir() {
  sortAsc = !sortAsc;
  doSort();
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  if(card) card.classList.toggle('expanded');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
function init() {
  doSort();
}
init();

// Re-render on resize (switch between mobile/desktop)
let lastW = window.innerWidth;
window.addEventListener('resize', () => {
  if(Math.abs(window.innerWidth - lastW) > 50) {
    lastW = window.innerWidth;
    doSort();
  }
});
</script>
</body>
</html>
